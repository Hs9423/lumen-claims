<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen Claims</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Welcome to Lumen Claims</h1>
    </header>

    <nav>
        <ul class="tabs">
            <li class="tab active">Home</li>
            <li class="tab">About</li>
            <li class="tab">Services</li>
            <li class="tab">Contact</li>
        </ul>
    </nav>

    <section class="accordion">
        <h2>Frequently Asked Questions</h2>
        <div class="accordion-item">
            <div class="accordion-header">Question 1?</div>
            <div class="accordion-content">Answer to question 1.</div>
        </div>
        <div class="accordion-item">
            <div class="accordion-header">Question 2?</div>
            <div class="accordion-content">Answer to question 2.</div>
        </div>
    </section>

    <form id="claimForm">
        <h2>Submit Your Claim</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
